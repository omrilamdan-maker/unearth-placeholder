<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Land UnEarth</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; color: #4a3f35; background: #fdf8e7; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .container { width: 90%; max-width: 500px; background: white; padding: 2rem; border-radius: 14px; box-shadow: 0 10px 24px rgba(0,0,0,0.1); text-align: center; }
    input { width: 100%; padding: 0.8rem; margin: 0.5rem 0; border: 1px solid #d2b48c; border-radius: 12px; }
    button { width: 100%; padding: 0.8rem; background: #d2b48c; color: #2f261f; font-weight: bold; border: none; border-radius: 12px; cursor: pointer; }
    button:disabled { background: #ccc; }
    .sr-only { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Land UnEarth</h2>
    <p>Turn your vacant land into profit.</p>
    <form id="lead-form">
      <input type="text" name="company" style="display:none" tabindex="-1">
      <input name="fullName" type="text" placeholder="Full Name" required>
      <input name="parcelId" type="text" placeholder="Parcel ID (8 digits)" required>
      <input name="phone" type="tel" placeholder="Phone Number" required>
      <input name="email" type="email" placeholder="Email" required>
      <button id="submitBtn" type="submit">Submit</button>
    </form>
  </div>

  <script>
    const form = document.getElementById('lead-form');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // REPLACE THE URL BELOW WITH YOUR NEW WEB APP URL
      const endpoint = 'https://script.google.com/macros/s/AKfycbyW_fHilw1gDReMp06nzznZvabBlQ5RfGHL1RIqGXGLU6MbHsdKeC7CyVw_EE0XOsRN/exec';

      const data = Object.fromEntries(new FormData(form));
      if (data.company) return; // Honeypot

      try {
        btn.disabled = true;
        btn.innerText = 'Sending...';
        
        await fetch(endpoint, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ ...data, key: 'LandUnEarth2025!' })
        });

        alert('Success! Check your new sheet.');
        form.reset();
      } catch (err) {
        alert('Error sending data.');
      } finally {
        btn.disabled = false;
        btn.innerText = 'Submit';
      }
    });
  </script>
</body>
</html>
